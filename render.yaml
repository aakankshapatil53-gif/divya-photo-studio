# Render Blueprint — deploys the whole project (backend API, frontend, and a
# free PostgreSQL database) in one go.
#
# HOW TO USE:
# 1. Push this project to a GitHub repository.
# 2. In the Render dashboard: New → Blueprint → connect your repo → Apply.
#    Render creates all three resources below. The database URL is wired
#    automatically; a few values are marked sync:false, meaning Render will
#    ask you to type them in during setup (or you fill them in afterwards
#    under each service's "Environment" tab).
# 3. FIRST DEPLOY ONLY — the frontend and backend don't know each other's
#    live URL until after they've both deployed once. After the first
#    deploy finishes:
#      a. Copy the backend's URL (e.g. https://divya-photo-studio-backend.onrender.com)
#         and set the frontend's NEXT_PUBLIC_API_URL to that URL + "/api"
#         (e.g. https://divya-photo-studio-backend.onrender.com/api)
#      b. Copy the frontend's URL (e.g. https://divya-photo-studio-frontend.onrender.com)
#         and set the backend's FRONTEND_URL to that URL.
#      c. Both services will redeploy automatically after you save these.
# 4. Run the seed command once from the Render shell (backend service →
#    "Shell" tab): npm run seed
#    This creates your admin login using ADMIN_USERNAME / ADMIN_PASSWORD.

databases:
  - name: divya-photo-studio-db
    plan: free
    databaseName: divya_photo_studio
    user: divya_photo_studio

services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: divya-photo-studio-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run render-start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: divya-photo-studio-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false # set to your deployed frontend URL after first deploy — see step 3b above
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: divyahdphotostudio@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: NOTIFY_EMAIL
        value: divyahdphotostudio@gmail.com

  # ── Frontend (Next.js) ───────────────────────────────────────
  - type: web
    name: divya-photo-studio-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false # set to your deployed backend URL + "/api" after first deploy — see step 3a above
